<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Отчёт</title>
  <style>
    body { font-family: sans-serif; padding: 2rem; max-width: 900px; margin: auto; }
    table { border-collapse: collapse; width: 100%; margin-bottom: 2rem; }
    th, td { border: 1px solid #ccc; padding: 8px 12px; text-align: left; }
    th { background: #f0f0f0; }
    h1 { color: #333; }
    h2 { color: #555; margin-top: 2rem; }
  </style>
</head>
<body>
  <h1>Отчёт по данным</h1>
  <p>Всего строк: <strong>50</strong></p>
  
  <h2>Числовые колонки</h2>
  <table>
    <thead>
      <tr><th>Колонка</th><th>Кол-во</th><th>Min</th><th>Max</th><th>Среднее</th></tr>
    </thead>
    <tbody>
  <tr>
    <td>Age</td>
    <td>50</td>
    <td>20.00</td>
    <td>65.00</td>
    <td>43.94</td>
  </tr>
  <tr>
    <td>Weight</td>
    <td>50</td>
    <td>45.40</td>
    <td>118.10</td>
    <td>80.63</td>
  </tr></tbody>
  </table>
  
  <h2>Колонка: Name</h2>
  <table>
    <thead><tr><th>Значение</th><th>Кол-во</th></tr></thead>
    <tbody><tr><td>Diana</td><td>17</td></tr><tr><td>Charlie</td><td>14</td></tr><tr><td>Bob</td><td>10</td></tr><tr><td>Alice</td><td>9</td></tr></tbody>
  </table>
  <h2>Колонка: City</h2>
  <table>
    <thead><tr><th>Значение</th><th>Кол-во</th></tr></thead>
    <tbody><tr><td>Kazan</td><td>15</td></tr><tr><td>Moscow</td><td>13</td></tr><tr><td>SPB</td><td>13</td></tr><tr><td>Novosibirsk</td><td>9</td></tr></tbody>
  </table>
</body>
</html>
